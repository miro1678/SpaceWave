<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SpaceWave</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #05060e;
    color: #cfe3ff;
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(circle at 20% 10%, rgba(60,90,200,0.18), transparent 45%),
      radial-gradient(circle at 80% 90%, rgba(180,40,120,0.16), transparent 45%),
      #05060e;
  }

  #shell {
    position: relative;
    width: min(480px, 96vw);
    aspect-ratio: 480 / 720;
    max-height: 96vh;
    border-radius: 14px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(120,160,255,0.15),
      0 0 60px rgba(40,80,200,0.25),
      0 30px 80px rgba(0,0,0,0.6);
    background: #02030a;
  }

  canvas { display: block; width: 100%; height: 100%; touch-action: none; }

  /* Scanline / vignette overlay */
  #shell::after {
    content: "";
    position: absolute; inset: 0; pointer-events: none;
    background:
      repeating-linear-gradient(to bottom, rgba(255,255,255,0.025) 0 1px, transparent 1px 3px),
      radial-gradient(circle at 50% 45%, transparent 55%, rgba(0,0,0,0.55) 100%);
    mix-blend-mode: overlay;
  }

  /* ── Start / Game Over Overlays ── */
  .overlay {
    position: absolute; inset: 0; z-index: 5;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 24px;
    background: radial-gradient(circle at 50% 40%, rgba(10,16,40,0.82), rgba(2,3,10,0.94));
    backdrop-filter: blur(2px);
  }
  .overlay.hidden { display: none; }

  .title {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(38px, 11vw, 64px);
    letter-spacing: 4px;
    line-height: 0.95;
    background: linear-gradient(180deg, #8fd0ff, #4d7bff 55%, #b13cff);
    -webkit-background-clip: text; background-clip: text;
    color: transparent;
    text-shadow: 0 0 30px rgba(80,130,255,0.4);
  }
  .title .wave { display: block; color: transparent; }

  .subtitle {
    margin-top: 6px; font-size: 15px; letter-spacing: 3px;
    text-transform: uppercase; color: #6f86c0; font-weight: 600;
  }

  .go-title {
    font-family: 'Orbitron', sans-serif; font-weight: 900;
    font-size: clamp(34px, 10vw, 56px); letter-spacing: 3px;
    color: #ff5a4d; text-shadow: 0 0 26px rgba(255,60,40,0.6);
    animation: pulseGO 1s ease-in-out infinite alternate;
  }
  @keyframes pulseGO {
    from { color:#ff4030; text-shadow:0 0 18px rgba(255,40,30,0.5); }
    to   { color:#ff9a30; text-shadow:0 0 34px rgba(255,140,30,0.7); }
  }

  .score-final { margin-top: 14px; font-size: 22px; font-weight: 700; color: #ffd84d; letter-spacing: 1px; }

  .btn {
    margin-top: 26px;
    font-family: 'Orbitron', sans-serif; font-weight: 700;
    font-size: 16px; letter-spacing: 2px;
    color: #eaf2ff; text-transform: uppercase;
    padding: 14px 34px; border: none; cursor: pointer; border-radius: 10px;
    background: linear-gradient(135deg, #2f6bff, #7b34ff);
    box-shadow: 0 6px 22px rgba(60,90,255,0.45), inset 0 1px 0 rgba(255,255,255,0.3);
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(80,110,255,0.6), inset 0 1px 0 rgba(255,255,255,0.4); }
  .btn:active { transform: translateY(0); }

  .controls {
    margin-top: 30px; font-size: 14px; line-height: 1.9;
    color: #8499cf; letter-spacing: 0.5px; max-width: 340px;
  }
  .controls b { color: #cfe0ff; font-weight: 700; }
  kbd {
    display: inline-block; min-width: 22px; padding: 2px 7px; margin: 0 1px;
    font-family: 'Rajdhani', monospace; font-weight: 700; font-size: 13px;
    color: #dceaff; background: #161f3e;
    border: 1px solid #2d3c6e; border-bottom-width: 3px; border-radius: 5px;
  }

  .legend {
    margin-top: 22px; display: grid; grid-template-columns: 1fr 1fr;
    gap: 6px 18px; font-size: 13px; text-align: left; max-width: 360px;
  }
  .legend .row { display: flex; align-items: center; gap: 8px; }
  .legend .dot { width: 13px; height: 13px; border-radius: 50%; flex: 0 0 13px; box-shadow: 0 0 8px currentColor; }

  .hint-mobile { margin-top: 18px; font-size: 13px; color: #6f86c0; display: none; }
  @media (pointer: coarse) { .hint-mobile { display: block; } .controls .kbhint { display:none; } }
</style>
</head>
<body>
<div id="shell">
  <canvas id="game" width="480" height="720"></canvas>

  <!-- Start screen -->
  <div class="overlay" id="startScreen">
    <div class="title">SPACE<span class="wave">WAVE</span></div>
    <div class="subtitle">Endless Arcade Shooter</div>
    <div class="controls">
      <span class="kbhint"><b>Bewegen:</b> <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> oder Pfeiltasten · <b>Schießen:</b> <kbd>Leer</kbd></span>
      <div class="hint-mobile">Links wischen/halten zum Steuern · automatisches Feuer</div>
    </div>
    <div class="legend" id="legend"></div>
    <button class="btn" id="startBtn">Start</button>
  </div>

  <!-- Game over screen -->
  <div class="overlay hidden" id="gameOverScreen">
    <div class="go-title">GAME OVER</div>
    <div class="score-final" id="finalScore">Punkte: 0</div>
    <button class="btn" id="restartBtn">Neu starten</button>
  </div>
</div>

const PU_TRIPLE = 0, PU_SCHNELLFEUER = 1, PU_ZEITSTOPP = 2, PU_DOPPELPUNKTE = 3,
      PU_BOMBE = 4, PU_CHAOS = 5, PU_TODESBOMBE = 6, PU_MEGA = 7;

const PU_FARBEN = {
  0:'#ffe51a', 1:'#33e6ff', 2:'#bf66ff', 3:'#4dff73',
  4:'#ff7326', 5:'#ff4dcc', 6:'#ff1a1a', 7:'#ffd633'
};
const PU_NAME = {
  0:'Triple Shot', 1:'Maschinengewehr', 2:'Zeitstopp', 3:'x2 Punkte',
  4:'Bombe', 5:'Chaos!', 6:'TODESBOMBE', 7:'MEGA-BOOST'
};

// Legende auf dem Startscreen aufbauen
(function buildLegend(){
  const el = document.getElementById('legend');
  const order = [0,1,2,3,4,5,7,6];
  order.forEach(t => {
    const row = document.createElement('div');
    row.className = 'row';
    row.innerHTML = `<span class="dot" style="color:${PU_FARBEN[t]};background:${PU_FARBEN[t]}"></span><span>${PU_NAME[t]}</span>`;
    el.appendChild(row);
  });
})();

// ─── Eingabe ───────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// Touch-Steuerung (Finger = Zielposition, Dauerfeuer an)
let touchActive = false, touchX = 0, touchY = 0;
function touchPos(t){
  const r = canvas.getBoundingClientRect();
  touchX = (t.clientX - r.left) / r.width * W;
  touchY = (t.clientY - r.top) / r.height * H;
}
canvas.addEventListener('touchstart', e => { touchActive = true; touchPos(e.touches[0]); e.preventDefault(); }, {passive:false});
canvas.addEventListener('touchmove',  e => { touchPos(e.touches[0]); e.preventDefault(); }, {passive:false});
canvas.addEventListener('touchend',   e => { touchActive = false; e.preventDefault(); }, {passive:false});

// ════════════════════════════════════════════════════════════════════════════
//  Sound (kleine WebAudio-Synth-Effekte – kein externes Asset nötig)
// ════════════════════════════════════════════════════════════════════════════
const Sound = (() => {
  let actx = null;
  function ensure(){ if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)(); return actx; }
  function blip(freq, dur, type='square', vol=0.12, slideTo=null){
    const a = ensure();
    const o = a.createOscillator(), g = a.createGain();
    o.type = type; o.frequency.value = freq;
    if(slideTo) o.frequency.linearRampToValueAtTime(slideTo, a.currentTime + dur);
    g.gain.setValueAtTime(vol, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + dur);
    o.connect(g).connect(a.destination);
    o.start(); o.stop(a.currentTime + dur);
  }
  function noise(dur, vol=0.18){
    const a = ensure();
    const n = a.sampleRate * dur;
    const buf = a.createBuffer(1, n, a.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i] = (Math.random()*2-1) * (1 - i/n);
    const src = a.createBufferSource(); src.buffer = buf;
    const g = a.createGain(); g.gain.value = vol;
    src.connect(g).connect(a.destination); src.start();
  }
  return {
    resume(){ ensure().resume && ensure().resume(); },
    schuss(){ blip(880, 0.07, 'square', 0.05, 1400); },
    pickup(){ blip(523,0.08,'square',0.12,784); setTimeout(()=>blip(784,0.1,'square',0.12,1046),70); },
    treffer(){ noise(0.12, 0.12); },
    explosion(){ noise(0.3, 0.22); blip(120,0.3,'sawtooth',0.1,40); },
    gameover(){ blip(440,0.2,'sawtooth',0.15,110); setTimeout(()=>blip(220,0.5,'sawtooth',0.15,55),180); },
    bombe(){ noise(0.5,0.3); blip(80,0.5,'sawtooth',0.18,30); },
    mega(){ [523,659,784,1046].forEach((f,i)=>setTimeout(()=>blip(f,0.12,'square',0.13),i*70)); }
  };
})();

const rand = (a,b) => a + Math.random()*(b-a);
const clamp = (v,a,b) => v<a?a:(v>b?b:v);
function dist(ax,ay,bx,by){ const dx=ax-bx, dy=ay-by; return Math.hypot(dx,dy); }

const stars = [];
for(let i=0;i<90;i++) stars.push({ x:Math.random()*W, y:Math.random()*H, s:rand(0.4,1.8), v:rand(20,90) });
function updateStars(dt){
  for(const s of stars){ s.y += s.v*dt; if(s.y>H){ s.y=-2; s.x=Math.random()*W; } }
}
function drawStars(){
  for(const s of stars){
    ctx.globalAlpha = 0.3 + s.s/2.2;
    ctx.fillStyle = '#aec6ff';
    ctx.fillRect(s.x, s.y, s.s, s.s);
  }
  ctx.globalAlpha = 1;
}

//  Spielobjekte

class Geschoss {
  constructor(x,y,vx,vy,spieler){
    this.x=x; this.y=y; this.vx=vx; this.vy=vy;
    this.spieler=spieler; this.schaden=1; this.tot=false; this.eingefroren=false;
  }
  update(dt){
    if(this.eingefroren && !this.spieler) return;
    this.x += this.vx*dt; this.y += this.vy*dt;
    if(this.y<-30||this.y>750||this.x<-30||this.x>510) this.tot=true;
  }
  draw(){
    if(this.spieler){
      ctx.fillStyle='#7fd0ff'; ctx.shadowColor='#3aa0ff'; ctx.shadowBlur=8;
      ctx.fillRect(this.x-2.5, this.y-9, 5, 16);
    } else {
      ctx.fillStyle = this.eingefroren ? '#8fa8ff' : '#ff5a5a';
      ctx.shadowColor='#ff3030'; ctx.shadowBlur=8;
      ctx.fillRect(this.x-2.5, this.y-7, 5, 14);
    }
    ctx.shadowBlur=0;
  }
}

class Gegner {
  constructor(typ){
    this.typ=typ; this.x=0; this.y=-40; this.vx=0; this.vy=80;
    this.tot=false; this.eingefroren=false; this.flash=0;
    this.schussTimer = rand(1.0, 3.0);
    switch(typ){
      case 1: this.farbe='#ff4040'; this.leben=1; this.treff=26; this.pause=3.5; this.punkte=10; break;
      case 2: this.farbe='#4d80ff'; this.leben=2; this.treff=26; this.pause=2.2; this.punkte=25; break;
      case 3: this.farbe='#4dff66'; this.leben=6; this.treff=34; this.pause=1.4; this.punkte=80; break;
    }
    this.maxLeben=this.leben;
  }
  update(dt, game){
    if(this.eingefroren) return;
    this.x += this.vx*dt; this.y += this.vy*dt;
    if(this.typ===2) this.x += Math.sin(performance.now()*0.004 + this.y*0.05)*1.2;
    if(this.flash>0) this.flash -= dt;
    this.schussTimer -= dt;
    if(this.schussTimer<=0){
      this.schussTimer = this.pause * rand(0.7,1.3);
      game.gegnerSchuss(this.x, this.y + this.treff);
    }
    if(this.y>760) this.tot=true;
  }
  schaden_nehmen(menge, game){
    this.leben -= menge;
    Sound.treffer();
    if(this.leben<=0){ this.tot=true; return true; }
    this.flash=0.12; return false;
  }
  draw(){
    ctx.save();
    ctx.translate(this.x, this.y);
    const sz = this.treff;
    const img = this.typ===1 ? IMG.e1 : (this.typ===2 ? IMG.e2 : IMG.e3);
    // Zielbreite je Typ (Boss größer) – Seitenverhältnis der PNGs ~ 93/84 bzw 103/84
    const dw = this.typ===3 ? 64 : 50;
    const dh = dw * (84/ (this.typ===3?103:93));

    // Tint-Effekte: eingefroren (bläulich) bzw. Treffer (weiß) per Glow andeuten
    if(this.eingefroren){ ctx.shadowColor='#8db0ff'; ctx.shadowBlur=14; }
    else { ctx.shadowColor=this.farbe; ctx.shadowBlur=8; }

    if(img && img.complete && img.naturalWidth){
      // Gegner zeigen im Original nach unten → Sprite um 180° drehen
      ctx.rotate(Math.PI);
      ctx.drawImage(img, -dw/2, -dh/2, dw, dh);
      ctx.rotate(-Math.PI);
      // Weißes Aufblitzen bei Treffer als Overlay
      if(this.flash>0){
        ctx.globalAlpha = clamp(this.flash/0.12, 0, 1)*0.8;
        ctx.globalCompositeOperation='lighter';
        ctx.rotate(Math.PI);
        ctx.drawImage(img, -dw/2, -dh/2, dw, dh);
        ctx.rotate(-Math.PI);
        ctx.globalCompositeOperation='source-over';
        ctx.globalAlpha=1;
      }
      // Eingefroren: leichter blauer Schleier drüber
      if(this.eingefroren){
        ctx.globalAlpha=0.3; ctx.fillStyle='#6a90ff';
        ctx.beginPath(); ctx.arc(0,0,sz*0.6,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
      }
    } else {
      // Fallback-Dreieck
      let col = this.eingefroren?'#8db0ff':(this.flash>0?'#fff':this.farbe);
      ctx.shadowColor=col; ctx.shadowBlur=12; ctx.fillStyle=col;
      ctx.beginPath(); ctx.moveTo(0,sz*0.55); ctx.lineTo(-sz*0.55,-sz*0.35); ctx.lineTo(sz*0.55,-sz*0.35); ctx.closePath(); ctx.fill();
    }
    ctx.shadowBlur=0;
    // Boss-Lebensbalken
    if(this.typ===3 && this.leben<this.maxLeben){
      ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(-sz*0.55,-sz*0.7, sz*1.1, 5);
      ctx.fillStyle='#4dff66'; ctx.fillRect(-sz*0.55,-sz*0.7, sz*1.1*(this.leben/this.maxLeben), 5);
    }
    ctx.restore();
  }
}

class Muenze {
  constructor(typ){
    this.typ=typ; this.x=0; this.y=-30; this.v=70; this.startX=0;
    this.bob=0; this.puls=0; this.rot=0; this.tot=false; this.eingesammelt=false;
  }
  update(dt){
    this.y += this.v*dt; this.bob += dt; this.puls += dt;
    this.x = this.startX + Math.sin(this.bob*2.2)*10;
    if(this.typ===PU_TODESBOMBE) this.rot = Math.sin(this.puls*6)*0.15;
    else if(this.typ===PU_MEGA)  this.rot = Math.sin(this.puls*4)*0.12;
    else this.rot += 2.0*dt;
    if(this.y>760) this.tot=true;
  }
  draw(){
    const base = PU_FARBEN[this.typ];
    let amp=0.25, freq=5;
    if(this.typ===PU_TODESBOMBE){amp=0.45;freq=8;}
    else if(this.typ===PU_MEGA){amp=0.40;freq=7;}
    const f = 1 + Math.sin(this.puls*freq)*amp;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    const r = 15;
    ctx.shadowColor = base; ctx.shadowBlur = 18*Math.max(0.6,f);
    // Münzkörper
    ctx.fillStyle = base;
    ctx.globalAlpha = clamp(f,0.5,1);
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
    // innerer Ring
    ctx.shadowBlur=0;
    ctx.strokeStyle='rgba(255,255,255,0.55)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(0,0,r-4,0,Math.PI*2); ctx.stroke();
    // Marker
    if(this.typ===PU_TODESBOMBE){
      ctx.rotate(-this.rot);
      ctx.fillStyle='#000'; ctx.font='bold 20px Rajdhani'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('☠', 0, 1);
    } else if(this.typ===PU_MEGA){
      ctx.rotate(-this.rot);
      ctx.fillStyle='#7a4d00'; ctx.font='bold 20px Rajdhani'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('★', 0, 1);
    }
    ctx.restore();
  }
}

class Explosion {
  constructor(x,y,farbe,gross){
    this.x=x; this.y=y; this.farbe=farbe; this.t=0;
    this.dur = gross?0.55:0.4; this.max = gross?46:30; this.tot=false;
    this.parts=[];
    const n = gross?16:10;
    for(let i=0;i<n;i++){
      const a=Math.random()*Math.PI*2, sp=rand(40,gross?260:180);
      this.parts.push({x:0,y:0,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:rand(2,gross?6:4)});
    }
  }
  update(dt){
    this.t += dt;
    for(const p of this.parts){ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=0.92; p.vy*=0.92; }
    if(this.t>=this.dur) this.tot=true;
  }
  draw(){
    const k = this.t/this.dur;
    ctx.save(); ctx.translate(this.x,this.y);
    ctx.globalAlpha = (1-k);
    ctx.shadowColor=this.farbe; ctx.shadowBlur=20;
    // Kern
    ctx.fillStyle=this.farbe;
    ctx.beginPath(); ctx.arc(0,0,this.max*(0.3+k*0.7),0,Math.PI*2); ctx.fill();
    // Funken
    ctx.fillStyle='#fff';
    for(const p of this.parts){ ctx.beginPath(); ctx.arc(p.x,p.y,p.r*(1-k),0,Math.PI*2); ctx.fill(); }
    ctx.restore(); ctx.globalAlpha=1; ctx.shadowBlur=0;
  }
}

//  Spieler
// ════════════════════════════════════════════════════════════════════════════
const GESCHW=320, SCHUSS_CD=0.18, SCHNELLFEUER_FAKTOR=0.18;
class Spieler {
  constructor(){
    this.x=240; this.y=640;
    this.schussTimer=0; this.soundTimer=0;
    this.unverwundbar=false; this.unverwTimer=0;
    this.boost=false; this.boostT=0;
    this.mega=false; this.megaT=0;
    this.schnell=false; this.schnellT=0;
    this.chaos=false; this.chaosT=0;
    this.alpha=1;
  }
  trefferReset(){ this.unverwundbar=true; this.unverwTimer=2.0; Sound.treffer(); }
  update(dt, game){
    // Bewegung
    let dx=0, dy=0;
    if(keys['ArrowLeft']||keys['KeyA']) dx-=1;
    if(keys['ArrowRight']||keys['KeyD']) dx+=1;
    if(keys['ArrowUp']||keys['KeyW']) dy-=1;
    if(keys['ArrowDown']||keys['KeyS']) dy+=1;
    if(this.chaos){ dx=-dx; dy=-dy; }
    if(dx||dy){ const l=Math.hypot(dx,dy); dx/=l; dy/=l; this.x+=dx*GESCHW*dt; this.y+=dy*GESCHW*dt; }
    // Touch: zur Fingerposition gleiten
    if(touchActive){
      let tx=touchX, ty=touchY;
      if(this.chaos){ tx = this.x - (touchX-this.x); ty = this.y - (touchY-this.y); }
      const ddx=tx-this.x, ddy=ty-this.y, dl=Math.hypot(ddx,ddy);
      if(dl>2){ const step=Math.min(GESCHW*dt, dl); this.x+=ddx/dl*step; this.y+=ddy/dl*step; }
    }
    this.x=clamp(this.x,25,455); this.y=clamp(this.y,60,700);

    // Schießen
    this.schussTimer-=dt; this.soundTimer-=dt;
    const feuer = this.schnell ? (keys['Space']||touchActive)
                               : (keys['Space'] && !this._spaceWar) || (touchActive && !this._touchWar);
    this._spaceWar = keys['Space']; this._touchWar = touchActive;
    const feuerJetzt = this.schnell ? (keys['Space']||touchActive) : feuer;
    if(this.schussTimer<=0 && feuerJetzt){
      const cd = SCHUSS_CD*(this.schnell?SCHNELLFEUER_FAKTOR:1);
      this.schussTimer=cd;
      if(this.soundTimer<=0){ Sound.schuss(); this.soundTimer = this.schnell?0.07:0; }
      const bx=this.x, by=this.y-30;
      const sp=550;
      const shoot=(ox,oy,ax,ay)=>game.spielerSchuss(bx+ox,by+oy,ax*sp,ay*sp);
      if(this.mega){
        shoot(0,0,0,-1);
        shoot(-6,2,-0.218,-0.976); shoot(6,2,0.218,-0.976);
        shoot(-12,4,-0.5,-0.866);  shoot(12,4,0.5,-0.866);
        shoot(0,-4,0,-1);
      } else if(this.boost){
        shoot(0,0,0,-1); shoot(-8,0,-0.42,-0.908); shoot(8,0,0.42,-0.908);
      } else {
        shoot(0,0,0,-1);
      }
    }

    // Timer ticken
    if(this.unverwundbar){ this.unverwTimer-=dt; this.alpha = (Math.floor(this.unverwTimer*7)%2===0)?0.25:1; if(this.unverwTimer<=0){this.unverwundbar=false;this.alpha=1;} }
    if(this.boost){ this.boostT-=dt; if(this.boostT<=0) this.boost=false; }
    if(this.mega){ this.megaT-=dt; if(this.megaT<=0) this.mega=false; }
    if(this.schnell){ this.schnellT-=dt; if(this.schnellT<=0) this.schnell=false; }
    if(this.chaos){ this.chaosT-=dt; if(this.chaosT<=0) this.chaos=false; }
  }
  draw(){
    ctx.save();
    ctx.globalAlpha=this.alpha;
    ctx.translate(this.x,this.y);
    // Triebwerks-Flamme (hinter dem Schiff)
    const flame = 8+Math.random()*7;
    ctx.fillStyle='rgba(255,170,40,0.85)'; ctx.shadowColor='#ff8a20'; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.moveTo(-6,18); ctx.lineTo(6,18); ctx.lineTo(0,18+flame); ctx.closePath(); ctx.fill();
    ctx.shadowBlur=0;
    // Mega-Aura (unter dem Sprite)
    if(this.mega){
      ctx.strokeStyle='rgba(255,214,51,0.6)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(0,0,30+Math.sin(performance.now()*0.01)*3,0,Math.PI*2); ctx.stroke();
    }
    // Original-Sprite (Boost-Variante wenn Triple/Mega aktiv)
    const img = (this.boost||this.mega) ? IMG.boost : IMG.spieler;
    const dw = 54, dh = dw * (75/99);   // Seitenverhältnis des PNGs
    if(this.mega){ ctx.shadowColor='#ffd633'; ctx.shadowBlur=16; }
    if(img && img.complete && img.naturalWidth){
      ctx.drawImage(img, -dw/2, -dh/2, dw, dh);
    } else {
      // Fallback, falls Sprite noch nicht geladen
      ctx.fillStyle='#7fd0ff';
      ctx.beginPath(); ctx.moveTo(0,-20); ctx.lineTo(-14,14); ctx.lineTo(14,14); ctx.closePath(); ctx.fill();
    }
    ctx.restore();
    ctx.globalAlpha=1; ctx.shadowBlur=0;
  }
}

// ════════════════════════════════════════════════════════════════════════════
//  Game
// ════════════════════════════════════════════════════════════════════════════
const MUENZEN_PAUSE = 40.0;
const ZEITSTOPP_DAUER = 3.0, DOPPELPUNKTE_DAUER = 10.0;

class Game {
  constructor(){
    this.reset();
  }
  reset(){
    this.punkte=0; this.leben=3; this.welle=1; this.laeuft=true;
    this.gegner=[]; this.geschosse=[]; this.muenzen=[]; this.explosionen=[];
    this.toasts=[];
    this.spieler=new Spieler();
    this.muenzenTimer=12.0;
    this.zeitstopp=false; this.zeitstoppT=0;
    this.doppel=false; this.doppelT=0;
    this.spielerRespawn=0;
    this.welleStarten();
  }
  welleStarten(){
    this.welleAus=false; this.gegnerGespawnt=0;
    this.gegnerProWelle = 5 + this.welle*2;
    this.spawnPause = Math.max(0.4, 1.8 - this.welle*0.12);
    this.spawnTimer = 0.5;
  }

  // ── Spawning ──
  zufaelligerTyp(){
    if(this.welle>=5 && Math.random()<0.15) return 3;
    if(this.welle>=3 && Math.random()<0.25) return 2;
    return 1;
  }
  typGeschw(t){
    if(t===1) return [rand(-30,30), 80 + this.welle*8];
    if(t===2) return [rand(-60,60), 80 + this.welle*14];
    if(t===3) return [0, 55 + this.welle*4];
    return [0,80];
  }
  gegnerSpawnen(){
    const t=this.zufaelligerTyp();
    const g=new Gegner(t);
    g.x=rand(40,440);
    const [vx,vy]=this.typGeschw(t); g.vx=vx; g.vy=vy;
    if(this.zeitstopp) g.eingefroren=true;
    this.gegner.push(g);
  }
  zufaelligerPowerup(){
    const r=Math.random();
    if(r<0.01) return PU_MEGA;          // 1 %
    if(r<0.13) return PU_TODESBOMBE;    // 12 %
    if(r<0.18) return PU_CHAOS;         // 5 %
    if(r<0.28) return PU_BOMBE;         // 10 %
    if(r<0.43) return PU_DOPPELPUNKTE;  // 15 %
    if(r<0.58) return PU_ZEITSTOPP;     // 15 %
    if(r<0.78) return PU_SCHNELLFEUER;  // 20 %
    return PU_TRIPLE;                   // 22 %
  }
  muenzeSpawnen(){
    const m=new Muenze(this.zufaelligerPowerup());
    m.x=rand(30,450); m.startX=m.x;
    this.muenzen.push(m);
  }

  // ── Schüsse ──
  spielerSchuss(x,y,vx,vy){ this.geschosse.push(new Geschoss(x,y,vx,vy,true)); }
  gegnerSchuss(x,y){ if(this.zeitstopp) return; const g=new Geschoss(x,y,0,480,false); if(this.zeitstopp) g.eingefroren=true; this.geschosse.push(g); }

  // ── Explosionen ──
  expl(x,y,farbe,gross=false){ this.explosionen.push(new Explosion(x,y,farbe,gross)); }
  toast(text,farbe){ this.toasts.push({text,farbe,t:1.6,y:120}); }

  // ── Power-Up Effekte ──
  powerupEinsammeln(typ){
    Sound.pickup();
    const s=this.spieler;
    switch(typ){
      case PU_TRIPLE:       s.boost=true; s.boostT=30; this.expl(s.x,s.y,'#ffe51a'); this.toast('TRIPLE SHOT','#ffe51a'); break;
      case PU_SCHNELLFEUER: s.schnell=true; s.schnellT=10; this.expl(s.x,s.y,'#33e6ff'); this.toast('MASCHINENGEWEHR','#33e6ff'); break;
      case PU_ZEITSTOPP:    this.aktiviereZeitstopp(); this.toast('ZEITSTOPP','#bf66ff'); break;
      case PU_DOPPELPUNKTE: this.doppel=true; this.doppelT=10; this.expl(s.x,s.y,'#4dff73'); this.toast('x2 PUNKTE','#4dff73'); break;
      case PU_BOMBE:        this.aktiviereBombe(); this.toast('BOMBE!','#ff7326'); break;
      case PU_CHAOS:        s.chaos=true; s.chaosT=8; this.expl(s.x,s.y,'#ff4dcc'); this.toast('STEUERUNG VERTAUSCHT','#ff4dcc'); break;
      case PU_TODESBOMBE:   this.aktiviereTodesbombe(); break;
      case PU_MEGA:         this.aktiviereMega(); this.toast('★ MEGA-BOOST ★','#ffd633'); break;
    }
  }
  aktiviereZeitstopp(){
    this.zeitstopp=true; this.zeitstoppT=ZEITSTOPP_DAUER;
    for(const g of this.gegner) g.eingefroren=true;
    for(const gs of this.geschosse) if(!gs.spieler) gs.eingefroren=true;
    this.expl(this.spieler.x,this.spieler.y,'#bf66ff');
  }
  aktiviereBombe(){
    Sound.bombe();
    const faktor = this.doppel?2:1;
    for(const g of this.gegner){ this.expl(g.x,g.y,g.farbe); this.punkte += g.punkte*faktor; g.tot=true; }
    for(const gs of this.geschosse) if(!gs.spieler) gs.tot=true;
    for(let i=0;i<6;i++) this.expl(rand(40,440),rand(80,600),'#ff8a26');
  }
  aktiviereTodesbombe(){
    Sound.explosion();
    for(const gs of this.geschosse) gs.tot=true;
    for(const g of this.gegner){ this.expl(g.x,g.y,'#ff3320'); g.tot=true; }
    for(let i=0;i<28;i++){
      const c=`rgb(255,${Math.floor(rand(25,100))},${Math.floor(rand(12,50))})`;
      this.expl(rand(20,460),rand(20,720), c, i%4===0);
    }
    this.expl(this.spieler.x,this.spieler.y,'#ff1a00',true);
    this.toast('☠ TODESBOMBE ☠','#ff1a1a');
    this.leben=0;
    this.gameOverDelay=0.6;
  }
  aktiviereMega(){
    Sound.mega();
    const s=this.spieler; const D=15;
    s.boost=true; s.boostT=D;
    s.schnell=true; s.schnellT=D;
    s.mega=true; s.megaT=D;
    this.doppel=true; this.doppelT=D;
    for(let i=0;i<8;i++) this.expl(s.x+rand(-40,40), s.y+rand(-40,40), '#ffd633');
  }

  // ── Spieler getroffen ──
  spielerTrifft(){
    if(!this.laeuft || this.spieler.unverwundbar) return;
    this.leben--; 
    this.expl(this.spieler.x,this.spieler.y,'#ff5a00',true);
    for(let i=0;i<3;i++) this.expl(this.spieler.x+rand(-45,45),this.spieler.y+rand(-45,45),'#ffb31a');
    if(this.leben<=0){ this.gameOver(); }
    else { this.spieler.trefferReset(); }
  }

  gameOver(){
    this.laeuft=false; Sound.gameover();
    document.getElementById('finalScore').textContent = 'Punkte: '+this.punkte;
    setTimeout(()=>{ document.getElementById('gameOverScreen').classList.remove('hidden'); }, this.gameOverDelay?600:200);
    this.gameOverDelay=0;
  }

  // ── Update ──
  update(dt){
    updateStars(dt);
    if(!this.laeuft) return;

    // Gegner spawnen
    if(this.gegnerGespawnt < this.gegnerProWelle){
      this.spawnTimer-=dt;
      if(this.spawnTimer<=0){ this.spawnTimer=this.spawnPause; this.gegnerSpawnen(); this.gegnerGespawnt++; }
    }
    // Münzen
    this.muenzenTimer-=dt;
    if(this.muenzenTimer<=0){ this.muenzenTimer = MUENZEN_PAUSE*rand(0.8,1.2); this.muenzeSpawnen(); }
    // Zeitstopp
    if(this.zeitstopp){ this.zeitstoppT-=dt; if(this.zeitstoppT<=0){ this.zeitstopp=false; for(const g of this.gegner)g.eingefroren=false; for(const gs of this.geschosse)gs.eingefroren=false; } }
    if(this.doppel){ this.doppelT-=dt; if(this.doppelT<=0) this.doppel=false; }

    this.spieler.update(dt, this);
    for(const g of this.gegner) g.update(dt, this);
    for(const gs of this.geschosse) gs.update(dt);
    for(const m of this.muenzen) m.update(dt);
    for(const e of this.explosionen) e.update(dt);
    for(const t of this.toasts){ t.t-=dt; t.y-=dt*8; }

    this.kollisionen();

    // Welle beendet?
    if(this.gegnerGespawnt>=this.gegnerProWelle && this.gegner.length===0 && !this.welleAus){
      this.welleAus=true; this.welle++;
      setTimeout(()=>{ if(this.laeuft) this.welleStarten(); }, 1500);
    }

    // aufräumen
    this.gegner = this.gegner.filter(g=>!g.tot);
    this.geschosse = this.geschosse.filter(g=>!g.tot);
    this.muenzen = this.muenzen.filter(m=>!m.tot);
    this.explosionen = this.explosionen.filter(e=>!e.tot);
    this.toasts = this.toasts.filter(t=>t.t>0);
  }

  kollisionen(){
    const s=this.spieler;
    for(const gs of this.geschosse){
      if(gs.tot) continue;
      if(gs.spieler){
        // Münzen treffen
        for(const m of this.muenzen){
          if(m.tot||m.eingesammelt) continue;
          if(dist(gs.x,gs.y,m.x,m.y)<16){ gs.tot=true; m.eingesammelt=true; m.tot=true; this.powerupEinsammeln(m.typ); break; }
        }
        if(gs.tot) continue;
        // Gegner treffen
        for(const g of this.gegner){
          if(g.tot) continue;
          if(dist(gs.x,gs.y,g.x,g.y)<g.treff){
            this.expl(g.x,g.y,g.farbe);
            const kill=g.schaden_nehmen(gs.schaden,this);
            gs.tot=true;
            if(kill){ const f=this.doppel?2:1; this.punkte += g.punkte*f; }
            break;
          }
        }
      } else {
        // Gegner-Geschoss trifft Spieler
        if(!s.unverwundbar && dist(gs.x,gs.y,s.x,s.y)<22){ gs.tot=true; this.spielerTrifft(); }
      }
    }
    // Gegner rammt Spieler
    if(!s.unverwundbar){
      for(const g of this.gegner){
        if(g.tot) continue;
        if(dist(g.x,g.y,s.x,s.y)<g.treff+18){ this.expl(g.x,g.y,g.farbe); g.tot=true; this.spielerTrifft(); break; }
      }
    }
  }

  // ── Zeichnen ──
  draw(){
    ctx.clearRect(0,0,W,H);
    drawStars();
    for(const e of this.explosionen) e.draw();
    for(const m of this.muenzen) m.draw();
    for(const g of this.gegner) g.draw();
    for(const gs of this.geschosse) gs.draw();
    if(this.laeuft) this.spieler.draw();
    this.drawUI();
  }

  drawUI(){
    ctx.textBaseline='alphabetic';
    // Punkte
    ctx.font='700 22px Orbitron, sans-serif';
    ctx.textAlign='left'; ctx.fillStyle='#dfeaff';
    ctx.fillText('Punkte: '+this.punkte, 12, 32);
    // Welle
    ctx.textAlign='center'; ctx.fillStyle='#9fb6e8';
    ctx.fillText('Welle '+this.welle, W/2, 32);
    // Leben
    ctx.textAlign='right'; ctx.fillStyle='#ff5a5a';
    ctx.font='22px Rajdhani, sans-serif';
    ctx.fillText('♥'.repeat(Math.max(0,this.leben)), W-12, 32);

    // Status-Labels (gestapelt)
    let yy=58; ctx.textAlign='center'; ctx.font='700 18px Rajdhani, sans-serif';
    const s=this.spieler;
    const lbl=(txt,col)=>{ ctx.fillStyle=col; ctx.fillText(txt, W/2, yy); yy+=24; };
    if(s.boost && !s.mega) lbl('⚡ TRIPLE SHOT  '+Math.ceil(s.boostT)+'s ⚡','#ffe51a');
    if(s.schnell && !s.mega) lbl('🔫 MASCHINENGEWEHR  '+Math.ceil(s.schnellT)+'s','#33e6ff');
    if(this.zeitstopp) lbl('❄ ZEITSTOPP  '+this.zeitstoppT.toFixed(1)+'s','#cf99ff');
    if(this.doppel && !s.mega) lbl('✦ x2 PUNKTE  '+Math.ceil(this.doppelT)+'s','#4dff73');
    if(s.chaos) lbl('↺ STEUERUNG VERTAUSCHT  '+Math.ceil(s.chaosT)+'s','#ff4dcc');
    if(s.mega) lbl('★ MEGA-BOOST  '+Math.ceil(s.megaT)+'s ★','#ffd633');

    // Toast (Power-Up Name groß in der Mitte)
    for(const t of this.toasts){
      ctx.globalAlpha = clamp(t.t,0,1);
      ctx.font='900 30px Orbitron, sans-serif';
      ctx.fillStyle=t.farbe; ctx.shadowColor=t.farbe; ctx.shadowBlur=18;
      ctx.fillText(t.text, W/2, 300 + t.y);
      ctx.shadowBlur=0; ctx.globalAlpha=1;
    }

    // Wellen-Ansage
    if(this.welleAus){
      ctx.globalAlpha=0.9; ctx.font='900 26px Orbitron, sans-serif';
      ctx.fillStyle='#9fd0ff'; ctx.textAlign='center';
      ctx.fillText('Welle '+this.welle+' …', W/2, H/2);
      ctx.globalAlpha=1;
    }
  }
}

// ════════════════════════════════════════════════════════════════════════════
//  Loop & Steuerung der Screens
// ════════════════════════════════════════════════════════════════════════════
let game=null, last=0, running=false;

function loop(ts){
  if(!running) return;
  const dt = Math.min(0.05, (ts-last)/1000) || 0;
  last=ts;
  game.update(dt);
  game.draw();
  requestAnimationFrame(loop);
}

function startGame(){
  Sound.resume();
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  game=new Game();
  running=true; last=performance.now();
  requestAnimationFrame(loop);
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);

// Idle-Hintergrund animieren, solange das Spiel nicht läuft
(function idle(){
  if(!running){ ctx.clearRect(0,0,W,H); updateStars(0.016); drawStars(); }
  requestAnimationFrame(idle);
})();
</script>
