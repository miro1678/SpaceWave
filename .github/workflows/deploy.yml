name: Deploy SpaceWave zu Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy

    steps:
      - name: Code holen
        uses: actions/checkout@v4

      - name: Godot 4.6 herunterladen
        run: |
          GODOT_VERSION="4.6"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" godot
          chmod +x godot

      - name: Web-Export-Templates installieren
        run: |
          GODOT_VERSION="4.6"
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$TEMPLATE_DIR"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz" -O templates.tpz
          unzip -q templates.tpz -d templates_extracted
          mv templates_extracted/templates/* "$TEMPLATE_DIR/"

      - name: Godot Web-Export bauen
        run: |
          mkdir -p dist
          ./godot --headless --export-release "Web" ./dist/index.html

      - name: Zu Cloudflare deployen
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
